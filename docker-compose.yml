services:
  smtpserver:
    image: docker.io/ndscprm/postfix-smtp-relay:latest
    build:
      context: .
    restart: unless-stopped
    user: '0'
    volumes:
      - postfix-spool:/var/spool/postfix 
      # - ./conf/main.cf:/etc/postfix/main.cf:ro
      # - ./conf/sasl_passwd:/etc/postfix/sasl_passwd
    environment:
      RELAY_USER: teste@gmail.com
      RELAY_PASSWORD: minhasenha
      EMAIL_NAME: "[testmail]"
      EMAIL_SENDER: "test@localhost"
      TZ: "America/Sao_Paulo"
      # DEBIAN_FRONTEND: "noninteractive"

volumes:
  postfix-spool:
